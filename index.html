<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#3ddc84">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>Count My Days</title>

  <link id="bootstrap-theme-css" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/darkly/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <script>const BUILD_NUMBER = "202606211120";</script>
</head>

<body>

  <!-- FIXED TOOLBAR -->
  <nav id="mainNav" class="navbar navbar-expand px-3 py-2 gap-3">

    <div class="dropdown">
      <button class="btn dropdown-toggle" data-bs-toggle="dropdown">Edit</button>
      <ul class="dropdown-menu">
        <li><a class="dropdown-item" onclick="openDatesEditor()">Dates</a></li>
        <li><a class="dropdown-item" onclick="openCategoriesEditor()">Categories</a></li>
        <li><a class="dropdown-item" onclick="openImagesEditor()">Images</a></li>
      </ul>
    </div>

    <div class="dropdown">
      <button class="btn dropdown-toggle" data-bs-toggle="dropdown">Export</button>
      <ul class="dropdown-menu">
        <li><a class="dropdown-item" onclick="exportData()">Export JSON</a></li>
        <li><a class="dropdown-item" onclick="exportToQR()">Export QR</a></li>
      </ul>
    </div>

    <div class="dropdown">
      <button class="btn dropdown-toggle" data-bs-toggle="dropdown">Import</button>
      <ul class="dropdown-menu">
        <li><a class="dropdown-item" onclick="importData()">Import JSON</a></li>
        <li><a class="dropdown-item" onclick="startQRImport()">Import QR</a></li>
      </ul>
    </div>

    <button class="btn" onclick="openSettings()">Settings</button>

  </nav>

  <!-- MAIN CONTENT -->
  <div class="container-fluid px-3">

    <div id="countdownContainer"></div>

    <!-- DATES EDITOR -->
    <div id="datesEditor" class="d-none">
      <div id="datesEditorHeader">
        <h2 class="mb-3">Edit Dates</h2>
        <div id="addDateTileTop" class="mb-3"></div>
        <div id="editorFilters" class="mb-3"></div>
      </div>
      <div id="editorList"></div>
      <div id="addDateTile" class="mt-3"></div>
    </div>

    <!-- CATEGORIES EDITOR -->
    <div id="categoriesEditor" class="d-none">
      <div id="categoriesEditorHeader">
        <h2 class="mb-3">Edit Categories</h2>
        <div id="addCategoryTileTop" class="mb-3"></div>
        <div id="categoryFilters" class="mb-3"></div>
      </div>
      <div id="categoriesList"></div>
      <div id="addCategoryTile" class="mt-3"></div>
    </div>

    <!-- IMAGES EDITOR -->
    <div id="imagesEditor" class="d-none">
      <div id="imagesEditorHeader">
        <h2 class="mb-3">Edit Images</h2>
        <div id="addImageTileTop" class="mb-3"></div>
        <div id="imageFilters" class="mb-3"></div>
      </div>
      <div id="imagesList"></div>
      <div id="addImageTile" class="mt-3"></div>
    </div>

    <!-- SETTINGS PAGE -->
    <div id="settingsPage" class="d-none">
      <h2 class="mb-3">Settings</h2>

      <div class="d-flex gap-2 mb-3">
        <button class="btn btn-success editor-btn btn-wide ms-auto" onclick="closeSettings()">Done</button>
      </div>

      <div class="row mb-3 align-items-center col-md-8">
        <div class="col-4 text-end"><label class="form-label mb-0">Theme</label></div>
        <div class="col-8">
          <select id="themeSelector" class="form-select" onchange="changeTheme(this.value)">
            <option value="brite">Brite (light)</option>
            <option value="cerulean">Cerulean (light)</option>
            <option value="cosmo">Cosmo (light)</option>
            <option value="cyborg">Cyborg (dark)</option>
            <option value="darkly" selected>Darkly (dark)</option>
            <option value="flatly">Flatly (light)</option>
            <option value="journal">Journal (light)</option>
            <option value="litera">Litera (light)</option>
            <option value="lumen">Lumen (light)</option>
            <option value="lux">Lux (light)</option>
            <option value="materia">Materia (light)</option>
            <option value="minty">Minty (light)</option>
            <option value="morph">Morph (light)</option>
            <option value="pulse">Pulse (light)</option>
            <option value="quartz">Quartz (light)</option>
            <option value="sandstone">Sandstone (light)</option>
            <option value="simplex">Simplex (light)</option>
            <option value="sketchy">Sketchy (light)</option>
            <option value="slate">Slate (dark)</option>
            <option value="solar">Solar (dark)</option>
            <option value="spacelab">Spacelab (light)</option>
            <option value="superhero">Superhero (dark)</option>
            <option value="united">United (light)</option>
            <option value="vapor">Vapor (dark)</option>
            <option value="yeti">Yeti (light)</option>
            <option value="zephyr">Zephyr (light)</option>
          </select>
        </div>
      </div>

      <div class="row mb-3 align-items-center col-md-8">
        <div class="col-4 text-end"><label class="form-label mb-0">Countdown display</label></div>
        <div class="col-8">
          <select id="formatSelector" class="form-select" onchange="changeFormat(this.value)">
            <option value="days">Days</option>
            <option value="weeksAndDays">Weeks and days</option>
          </select>
        </div>
      </div>

      <div class="row mb-4 align-items-center col-md-8">
        <div class="col-4 text-end"><label class="form-label mb-0">Font size</label></div>
        <div class="col-8">
          <select id="fontSizeSelector" class="form-select" onchange="changeFontSize(this.value)">
            <option value="xsmall">Extra small</option>
            <option value="small">Small</option>
            <option value="normal">Normal</option>
            <option value="large">Large</option>
            <option value="xlarge">Extra large</option>
            <option value="jumbo">Jumbo</option>
          </select>
        </div>
      </div>

      <div class="row mb-4 align-items-center col-md-8">
        <div class="col-4 text-end"><label class="form-label mb-0">Icon size</label></div>
        <div class="col-8">
          <select id="iconSizeSelector" class="form-select" onchange="changeIconSize(this.value)">
            <option value="small">Small (64x64)</option>
            <option value="medium">Medium (80x80)</option>
            <option value="large">Large (100x100)</option>
          </select>
        </div>
      </div>

      <div class="row mb-3 align-items-center col-md-8">
        <div class="col-4 text-end"><label class="form-label mb-0">Max countdowns</label></div>
        <div class="col-8">
          <select id="maxCountdownsSelector" class="form-select" onchange="changeMaxCountdowns(this.value)">
            <option value="5">5</option>
            <option value="10">10</option>
            <option value="20">20</option>
            <option value="0">All</option>
          </select>
        </div>
      </div>

      <div class="row mb-4 align-items-center col-md-8">
        <div class="col-4 text-end"><label class="form-label mb-0">Auto-hide menu</label></div>
        <div class="col-8">
          <div class="form-check form-switch mt-1">
            <input id="autoHideMenu" class="form-check-input" type="checkbox" onchange="changeAutoHideMenu(this.checked)">
          </div>
        </div>
      </div>

      <div class="mt-4 row align-items-center col-md-8">
        <div class="col-4 text-end"></div>
        <div class="col-8">
          <a href="https://buymeacoffee.com/ownimage" target="_blank" rel="noopener">
            <img src="https://cdn.buymeacoffee.com/buttons/v2/default-yellow.png" alt="Buy Me A Coffee" style="height:50px">
          </a>
        </div>
      </div>

      <div class="row mb-4 align-items-center col-md-8">
        <div class="col-4 text-end"><label class="form-label mb-0">Show danger</label></div>
        <div class="col-8">
          <div class="form-check form-switch mt-1">
            <input id="showDanger" class="form-check-input" type="checkbox" onchange="changeShowDanger(this.checked)">
          </div>
        </div>
      </div>

      <div id="clearAllDataRow" class="mt-4 row align-items-center col-md-8 d-none">
        <div class="col-4 text-end"></div>
        <div class="col-8">
          <button class="btn btn-danger editor-btn btn-wide w-100" onclick="confirmClearAllData()">Clear All Data</button>
        </div>
      </div>
      <div id="reimportSamplesRow" class="mt-2 row align-items-center col-md-8 d-none">
        <div class="col-4 text-end"></div>
        <div class="col-8">
          <button class="btn btn-info editor-btn btn-wide w-100" onclick="reimportSampleImages()">Reload Sample Images</button>
        </div>
      </div>
      <div id="refreshAppRow" class="mt-2 row align-items-center col-md-8 d-none">
        <div class="col-4 text-end"></div>
        <div class="col-8">
          <button class="btn btn-warning editor-btn btn-wide w-100" onclick="location.reload()">Refresh App</button>
        </div>
      </div>
      <div class="mt-5 small build-number">Build <span id="buildNumber"></span></div>
    </div>
    <script>document.getElementById("buildNumber").textContent = BUILD_NUMBER;</script>

  </div>

  <!-- EXPORT WIZARD MODAL -->
  <div id="exportWizardModal" class="qr-modal d-none">
    <div class="qr-modal-content">
      <h3 id="exportWizardTitle">Export Wizard</h3>
      <div id="exportWizardBody" class="qr-scroll" style="text-align:left"></div>
      <div id="exportWizardFooter" class="d-flex gap-2 mt-3 justify-content-center"></div>
    </div>
  </div>

  <!-- IMPORT WIZARD MODAL -->
  <div id="importWizardModal" class="qr-modal d-none">
    <div class="qr-modal-content">
      <h3 id="importWizardTitle">Import Wizard</h3>
      <div id="importWizardBody" class="qr-scroll" style="text-align:left;overflow-x:hidden"></div>
      <div id="importWizardFooter" class="d-flex gap-2 mt-3 justify-content-center"></div>
    </div>
  </div>

  <!-- QR EXPORT MODAL -->
  <div id="qrExportModal" class="qr-modal d-none">
    <div class="qr-modal-content">
      <h3>Exported QR Codes</h3>
      <p class="text-secondary">Scan all QR codes to restore your data.</p>

      <div id="qrList" class="qr-scroll"></div>

      <button class="btn btn-success editor-btn btn-wide mt-3" onclick="closeQRExportModal()">Close</button>
    </div>
  </div>

  <!-- QR IMPORT MODAL -->
  <div id="qrImportModal" class="qr-modal d-none">
    <div class="qr-modal-content">
      <h3>Import via QR</h3>
      <p id="qrImportStatus" class="text-info">Waiting for QR scans…</p>

      <div id="qrReader" style="width: 100%; height: 320px;"></div>

      <button class="btn btn-danger mt-3" onclick="cancelQRImport()">Cancel</button>
    </div>
  </div>

  <!-- DELETE CONFIRM MODAL -->
  <div id="deleteConfirmModal" class="modal fade" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-body text-center pb-0">
          <p class="mb-3 fs-5" id="deleteConfirmMessage">Delete this date?</p>
        </div>
        <div class="modal-footer justify-content-center border-0 pt-2">
          <button class="btn btn-secondary editor-btn btn-wide" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-danger editor-btn btn-wide" id="deleteConfirmBtn">Delete</button>
        </div>
      </div>
    </div>
  </div>

  <!-- BOOTSTRAP JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- FLATPICKR -->
  <script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.js"></script>

  <!-- REQUIRED LIBRARIES FOR QR -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.6"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>


  <script>
  document.write('<script src="js/sampleImages.js?v=' + BUILD_NUMBER + '"><\/script>');
  document.write('<script src="js/sampleCategories.js?v=' + BUILD_NUMBER + '"><\/script>');
  document.write('<script src="js/sampleDates.js?v=' + BUILD_NUMBER + '"><\/script>');
  document.write('<script src="js/settings.js?v=' + BUILD_NUMBER + '"><\/script>');
  document.write('<script src="js/app.js?v=' + BUILD_NUMBER + '"><\/script>');
  document.write('<script src="js/dates.js?v=' + BUILD_NUMBER + '"><\/script>');
  document.write('<script src="js/categories.js?v=' + BUILD_NUMBER + '"><\/script>');
  document.write('<script src="js/images.js?v=' + BUILD_NUMBER + '"><\/script>');
  document.write('<script src="js/export.js?v=' + BUILD_NUMBER + '"><\/script>');
  document.write('<script src="js/import-wizard.js?v=' + BUILD_NUMBER + '"><\/script>');
  </script>

  <script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
  }
  </script>

</body>
</html>
