<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Count My Days</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <!-- Top Menu -->
  <div class="menu">

    <div class="menu-item">
      Edit
      <div class="submenu">
        <div class="submenu-item" onclick="openDatesEditor()">Dates</div>
        <div class="submenu-item" onclick="openCategoriesEditor()">Categories</div>
        <div class="submenu-item" onclick="openImagesEditor()">Images</div>
      </div>
    </div>

    <div class="menu-item">
      Export
      <div class="submenu">
        <div class="submenu-item">Export JSON</div>
        <div class="submenu-item">Export QR</div>
      </div>
    </div>

    <div class="menu-item">
      Import
      <div class="submenu">
        <div class="submenu-item">Import JSON</div>
        <div class="submenu-item">Import QR</div>
      </div>
    </div>

    <div class="menu-item">Settings</div>
  </div>

  <!-- Countdown View -->
  <div class="container" id="countdownContainer"></div>

  <!-- Dates Editor -->
  <div class="container" id="datesEditor" style="display:none;">
    <h2>Edit Dates</h2>
    <div id="editorList"></div>
    <div id="addDateTile"></div>
    <button class="btn btn-done" onclick="closeDatesEditor()">Done</button>
  </div>

  <!-- Categories Editor -->
  <div class="container" id="categoriesEditor" style="display:none;">
    <h2>Categories</h2>
    <div id="categoryListContainer"></div>
    <div id="addCategoryTile"></div>
    <button class="btn btn-done" onclick="closeCategoriesEditor()">Done</button>
  </div>

  <!-- Images Editor -->
  <div class="container" id="imagesEditor" style="display:none;">
    <h2>Images</h2>
    <div id="addImageTile"></div>
    <div id="imageList"></div>
    <button class="btn btn-done" onclick="closeImagesEditor()">Done</button>
  </div>

  <!-- JS Files (correct order) -->
  <script src="js/sampleImages.js"></script>
  <script src="js/app.js"></script>
  <script src="js/dates.js"></script>
  <script src="js/categories.js"></script>
  <script src="js/images.js"></script>

</body>
</html>
