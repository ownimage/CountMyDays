<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Count My Days</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
    }

    .menu {
      background: #333;
      color: white;
      padding: 12px 20px;
      display: flex;
      gap: 20px;
      font-size: 1.1rem;
    }

    .menu-item {
      cursor: pointer;
      user-select: none;
    }

    .menu-item:hover {
      text-decoration: underline;
    }

    .container {
      text-align: center;
      padding: 40px;
    }

    .count-box {
      background: white;
      padding: 20px;
      margin: 15px auto;
      border-radius: 12px;
      width: 300px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .count-title {
      font-size: 1.4rem;
      margin-bottom: 10px;
    }

    .count-number {
      font-size: 2.4rem;
      font-weight: bold;
      color: #c0392b;
    }
  </style>
</head>
<body>

  <!-- Top Menu -->
  <div class="menu">
    <div class="menu-item" onclick="menuAction('edit')">Edit</div>
    <div class="menu-item" onclick="menuAction('export')">Export</div>
    <div class="menu-item" onclick="menuAction('import')">Import</div>
    <div class="menu-item" onclick="menuAction('settings')">Settings</div>
  </div>

  <!-- Main Content -->
  <div class="container" id="countdownContainer">
    <!-- JS will fill this -->
  </div>

  <script>
    // Default dates if none exist
    const defaultDates = [
      { name: "Christmas", date: "2026-12-25" },
      { name: "Birthday", date: "2026-08-14" }
    ];

    // Ensure countdownDates exists
    function initStorage() {
      if (!localStorage.getItem("countdownDates")) {
        localStorage.setItem("countdownDates", JSON.stringify(defaultDates));
      }
    }

    // Load stored dates
    function loadDates() {
      return JSON.parse(localStorage.getItem("countdownDates")) || [];
    }

    // Calculate days until a date
    function daysUntil(dateString) {
      const today = new Date();
      const target = new Date(dateString);

      // If the date is in the past, move it to next year
      if (target < today) {
        target.setFullYear(today.getFullYear() + 1);
      }

      const diff = target - today;
      return Math.ceil(diff / (1000 * 60 * 60 * 24));
    }

    // Render countdowns
    function renderCountdowns() {
      const container = document.getElementById("countdownContainer");
      container.innerHTML = ""; // Clear existing

      const dates = loadDates();

      dates.forEach(item => {
        const box = document.createElement("div");
        box.className = "count-box";

        box.innerHTML = `
          <div class="count-title">${item.name}</div>
          <div class="count-number">${daysUntil(item.date)}</div>
        `;

        container.appendChild(box);
      });
    }

    // Placeholder menu actions
    function menuAction(action) {
      alert("You clicked: " + action);
    }

    // Initialise app
    initStorage();
    renderCountdowns();
  </script>

</body>
</html>
