<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>Count My Days</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="bg-dark">

  <nav class="navbar navbar-expand-lg navbar-dark bg-black px-3">
    <div class="container-fluid">
      <div class="navbar-nav d-flex flex-row gap-3">

        <div class="dropdown">
          <button class="btn btn-outline-light dropdown-toggle" data-bs-toggle="dropdown">Edit</button>
          <ul class="dropdown-menu dropdown-menu-dark">
            <li><a class="dropdown-item" onclick="openDatesEditor()">Dates</a></li>
            <li><a class="dropdown-item" onclick="openCategoriesEditor()">Categories</a></li>
            <li><a class="dropdown-item" onclick="openImagesEditor()">Images</a></li>
          </ul>
        </div>

        <div class="dropdown">
          <button class="btn btn-outline-light dropdown-toggle" data-bs-toggle="dropdown">Export</button>
          <ul class="dropdown-menu dropdown-menu-dark">
            <li><a class="dropdown-item" onclick="exportData()">Export JSON</a></li>
          </ul>
        </div>

        <div class="dropdown">
          <button class="btn btn-outline-light dropdown-toggle" data-bs-toggle="dropdown">Import</button>
          <ul class="dropdown-menu dropdown-menu-dark">
            <li><a class="dropdown-item" onclick="importData()">Import JSON</a></li>
          </ul>
        </div>

        <div class="dropdown">
          <button class="btn btn-outline-light dropdown-toggle" data-bs-toggle="dropdown">Settings</button>
          <ul class="dropdown-menu dropdown-menu-dark">
            <li><a class="dropdown-item" onclick="resetAll()">Reset All</a></li>
          </ul>
        </div>

      </div>
    </div>
  </nav>

  <div class="container my-4">

    <div id="countdownContainer"></div>

    <div id="datesEditor" class="d-none">
      <h2 class="mb-3">Edit Dates</h2>
      <div id="editorList"></div>
      <div id="addDateTile" class="mt-4"></div>
    </div>

    <div id="categoriesEditor" class="d-none">
      <h2 class="mb-3">Edit Categories</h2>
      <div id="categoriesList"></div>
      <div id="addCategoryTile" class="mt-4"></div>
    </div>

    <div id="imagesEditor" class="d-none">
      <h2 class="mb-3">Edit Images</h2>
      <div id="imagesList"></div>
      <div id="addImageTile" class="mt-4"></div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="js/sampleImages.js"></script>
  <script src="js/app.js"></script>
  <script src="js/dates.js"></script>
  <script src="js/categories.js"></script>
  <script src="js/images.js"></script>

</body>
</html>
