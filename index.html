<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Count My Days – Christmas</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 40px;
      background: #f4f4f4;
      text-align: center;
    }
    .box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      display: inline-block;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    h1 {
      margin-top: 0;
    }
    .count {
      font-size: 3rem;
      font-weight: bold;
      color: #c0392b;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>Days Until Christmas</h1>
    <div id="count" class="count">...</div>
  </div>

  <script>
    function daysUntilChristmas() {
      const today = new Date();
      const year = today.getFullYear();

      // Christmas this year
      let christmas = new Date(year, 11, 25); // Month is 0-indexed

      // If Christmas has already passed, use next year
      if (today > christmas) {
        christmas = new Date(year + 1, 11, 25);
      }

      const diffTime = christmas - today;
      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

      return diffDays;
    }

    document.getElementById("count").textContent = daysUntilChristmas();
  </script>

</body>
</html>
