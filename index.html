<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Count My Days</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
    }

    /* Top Menu */
    .menu {
      background: #333;
      color: white;
      padding: 12px 20px;
      display: flex;
      gap: 20px;
      font-size: 1.1rem;
      position: relative;
    }

    .menu-item {
      cursor: pointer;
      user-select: none;
      position: relative;
    }

    .menu-item:hover {
      text-decoration: underline;
    }

    /* Submenu */
    .submenu {
      position: absolute;
      top: 40px;
      background: #444;
      padding: 10px;
      border-radius: 6px;
      display: none;
      flex-direction: column;
      gap: 8px;
      z-index: 10;
    }

    .submenu-item {
      color: white;
      cursor: pointer;
      white-space: nowrap;
    }

    .submenu-item:hover {
      text-decoration: underline;
    }

    /* Countdown Boxes */
    .container {
      text-align: center;
      padding: 40px;
    }

    .count-box {
      background: white;
      padding: 20px;
      margin: 15px auto;
      border-radius: 12px;
      width: 340px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .count-title {
      font-size: 1.4rem;
      margin-bottom: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .count-number {
      font-size: 2.4rem;
      font-weight: bold;
      color: #c0392b;
    }

    /* Editor */
    .editor-item {
      background: white;
      padding: 10px;
      margin: 10px auto;
      border-radius: 8px;
      width: 360px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .editor-name {
      font-size: 1.1rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 260px;
    }

    .delete-btn {
      background: #c0392b;
      color: white;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- Top Menu -->
  <div class="menu">
    <div class="menu-item" onclick="menuAction('edit')">Edit</div>

    <div class="menu-item" onclick="toggleSubmenu('exportMenu')">
      Export
      <div id="exportMenu" class="submenu">
        <div class="submenu-item" onclick="exportAction('json')">Export JSON</div>
        <div class="submenu-item" onclick="exportAction('qr')">Export QR</div>
      </div>
    </div>

    <div class="menu-item" onclick="toggleSubmenu('importMenu')">
      Import
      <div id="importMenu" class="submenu">
        <div class="submenu-item" onclick="importAction('json')">Import JSON</div>
        <div class="submenu-item" onclick="importAction('qr')">Import QR</div>
      </div>
    </div>

    <div class="menu-item" onclick="menuAction('settings')">Settings</div>
  </div>

  <!-- Countdown View -->
  <div class="container" id="countdownContainer"></div>

  <!-- Editor View -->
  <div class="container" id="editorContainer" style="display:none;">
    <h2>Edit Dates</h2>

    <div id="editorList"></div>

    <h3>Add New Date</h3>

    <input id="newName" type="text" placeholder="Name">

    <select id="newType" onchange="updateTypeUI()">
      <option value="annual">Annual Event</option>
      <option value="once">One-off Event</option>
    </select>

    <div id="yearRow" style="display:none;">
      <input id="newYear" type="number" placeholder="Year" min="1900" max="3000">
    </div>

    <input id="newMonth" type="number" placeholder="Month (1-12)" min="1" max="12">
    <input id="newDay" type="number" placeholder="Day (1-31)" min="1" max="31">

    <button onclick="addDate()">Add</button>

    <br><br>
    <button onclick="closeEditor()">Done</button>
  </div>

  <script>
    // Default dataset (wipe + recreate)
    const defaultDates = [
      { name: "Christmas", month: 12, day: 25, type: "annual" },
      { name: "Holiday", year: 2026, month: 8, day: 21, type: "once" }
    ];

    function initStorage() {
      localStorage.setItem("countdownDates", JSON.stringify(defaultDates));
    }

    function loadDates() {
      return JSON.parse(localStorage.getItem("countdownDates")) || [];
    }

    function saveDates(dates) {
      localStorage.setItem("countdownDates", JSON.stringify(dates));
    }

    // Calculate days until event
    function daysUntil(item) {
      const today = new Date();
      let target;

      if (item.type === "annual") {
        target = new Date(today.getFullYear(), item.month - 1, item.day);
        if (target < today) {
          target = new Date(today.getFullYear() + 1, item.month - 1, item.day);
        }
      } else {
        target = new Date(item.year, item.month - 1, item.day);
        if (target < today) return null;
      }

      const diff = target - today;
      return Math.ceil(diff / (1000 * 60 * 60 * 24));
    }

    // COUNTDOWN VIEW
    function renderCountdowns() {
      const container = document.getElementById("countdownContainer");
      const editor = document.getElementById("editorContainer");

      container.style.display = "block";
      editor.style.display = "none";
      container.innerHTML = "";

      let dates = loadDates();

      dates = dates
        .map(item => ({ ...item, daysRemaining: daysUntil(item) }))
        .filter(item => item.daysRemaining !== null);

      dates.sort((a, b) => a.daysRemaining - b.daysRemaining);

      dates.forEach(item => {
        const box = document.createElement("div");
        box.className = "count-box";

        const label = item.type === "annual"
          ? `${item.name} (annual)`
          : `${item.name} (${item.year})`;

        box.innerHTML = `
          <div class="count-title">${label}</div>
          <div class="count-number">${item.daysRemaining}</div>
        `;

        container.appendChild(box);
      });
    }

    // EDITOR VIEW
    function openEditor() {
      const container = document.getElementById("countdownContainer");
      const editor = document.getElementById("editorContainer");
      const list = document.getElementById("editorList");

      container.style.display = "none";
      editor.style.display = "block";
      list.innerHTML = "";

      const dates = loadDates();

      dates.forEach((item, index) => {
        const row = document.createElement("div");
        row.className = "editor-item";

        const label = item.type === "annual"
          ? `${item.name} — ${item.month}/${item.day} — annual`
          : `${item.name} — ${item.year}/${item.month}/${item.day} — once`;

        row.innerHTML = `
          <div class="editor-name">${label}</div>
          <button class="delete-btn" onclick="deleteDate(${index})">Delete</button>
        `;

        list.appendChild(row);
      });
    }

    function closeEditor() {
      renderCountdowns();
    }

    // ADD / DELETE
    function updateTypeUI() {
      const type = document.getElementById("newType").value;
      document.getElementById("yearRow").style.display =
        type === "once" ? "block" : "none";
    }

    function addDate() {
      const name = document.getElementById("newName").value.trim();
      const type = document.getElementById("newType").value;
      const month = parseInt(document.getElementById("newMonth").value);
      const day = parseInt(document.getElementById("newDay").value);

      if (!name || !month || !day) {
        alert("Please enter name, month, and day");
        return;
      }

      let newItem;

      if (type === "annual") {
        newItem = { name, month, day, type };
      } else {
        const year = parseInt(document.getElementById("newYear").value);
        if (!year) {
          alert("Please enter a year for one-off events");
          return;
        }
        newItem = { name, year, month, day, type };
      }

      const dates = loadDates();
      dates.push(newItem);
      saveDates(dates);

      openEditor();
    }

    function deleteDate(index) {
      const dates = loadDates();
      dates.splice(index, 1);
      saveDates(dates);
      openEditor();
    }

    // SUBMENU LOGIC
    function toggleSubmenu(id) {
      document.getElementById("exportMenu").style.display = "none";
      document.getElementById("importMenu").style.display = "none";

      const menu = document.getElementById(id);
      menu.style.display = menu.style.display === "flex" ? "none" : "flex";
    }

    window.onclick = function (event) {
      if (!event.target.classList.contains("menu-item")) {
        document.getElementById("exportMenu").style.display = "none";
        document.getElementById("importMenu").style.display = "none";
      }
    };

    // MENU ACTIONS
    function menuAction(action) {
      if (action === "edit") {
        openEditor();
        return;
      }

      alert("You clicked: " + action);
    }

    function exportAction(type) {
      alert("Export as " + type.toUpperCase());
    }

    function importAction(type) {
      alert("Import from " + type.toUpperCase());
    }

    // Init
    initStorage();
    renderCountdowns();
  </script>

</body>
</html>
