<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Count My Days</title>

  <link id="bootstrap-theme-css" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/darkly/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <script>const BUILD_NUMBER = "202606171628";</script>
</head>

<body>

  <!-- FIXED TOOLBAR -->
  <nav id="mainNav" class="navbar navbar-expand px-3 py-2 gap-3">

    <div class="dropdown">
      <button class="btn dropdown-toggle" data-bs-toggle="dropdown">Edit</button>
      <ul class="dropdown-menu">
        <li><a class="dropdown-item" onclick="openDatesEditor()">Dates</a></li>
        <li><a class="dropdown-item" onclick="openCategoriesEditor()">Categories</a></li>
        <li><a class="dropdown-item" onclick="openImagesEditor()">Images</a></li>
      </ul>
    </div>

    <div class="dropdown">
      <button class="btn dropdown-toggle" data-bs-toggle="dropdown">Export</button>
      <ul class="dropdown-menu">
        <li><a class="dropdown-item" onclick="exportData()">Export JSON</a></li>
        <li><a class="dropdown-item" onclick="exportToQR()">Export QR</a></li>
      </ul>
    </div>

    <div class="dropdown">
      <button class="btn dropdown-toggle" data-bs-toggle="dropdown">Import</button>
      <ul class="dropdown-menu">
        <li><a class="dropdown-item" onclick="importData()">Import JSON</a></li>
        <li><a class="dropdown-item" onclick="startQRImport()">Import QR</a></li>
      </ul>
    </div>

    <button class="btn" onclick="openSettings()">Settings</button>

  </nav>

  <!-- MAIN CONTENT -->
  <div class="container-fluid px-3">

    <div id="countdownContainer"></div>

    <!-- DATES EDITOR -->
    <div id="datesEditor" class="d-none">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">Edit Dates</h2>
        <div id="addDateTileTop" class="d-flex gap-2"></div>
      </div>
      <ul class="nav nav-tabs mb-3" id="datesTab">
        <li class="nav-item"><a class="nav-link" data-tab="past" onclick="switchDatesTab('past')">Past</a></li>
        <li class="nav-item"><a class="nav-link active" data-tab="current" onclick="switchDatesTab('current')">Current</a></li>
        <li class="nav-item"><a class="nav-link" data-tab="annual" onclick="switchDatesTab('annual')">Annual</a></li>
      </ul>
      <div id="editorList"></div>
      <div id="addDateTile" class="mt-4"></div>
    </div>

    <!-- CATEGORIES EDITOR -->
    <div id="categoriesEditor" class="d-none">
      <h2 class="mb-3">Edit Categories</h2>
      <div id="categoriesList"></div>
      <div id="addCategoryTile" class="mt-4"></div>
    </div>

    <!-- IMAGES EDITOR -->
    <div id="imagesEditor" class="d-none">
      <h2 class="mb-3">Edit Images</h2>
      <div id="imagesList"></div>
      <div id="addImageTile" class="mt-4"></div>
    </div>

    <!-- SETTINGS PAGE -->
    <div id="settingsPage" class="d-none">
      <h2 class="mb-3">Settings</h2>

      <div class="row mb-3 align-items-center col-md-8">
        <div class="col-4 text-end"><label class="form-label mb-0">Theme</label></div>
        <div class="col-8">
          <select id="themeSelector" class="form-select" onchange="changeTheme(this.value)">
            <option value="darkly">Darkly (dark)</option>
            <option value="flatly">Flatly (light)</option>
            <option value="zephyr">Zephyr (light)</option>
            <option value="superhero">Superhero (dark)</option>
            <option value="quartz">Light (default)</option>
            <option value="cyborg">Cyborg (midnight)</option>
          </select>
        </div>
      </div>

      <div class="row mb-3 align-items-center col-md-8">
        <div class="col-4 text-end"><label class="form-label mb-0">Countdown display</label></div>
        <div class="col-8">
          <select id="formatSelector" class="form-select" onchange="changeFormat(this.value)">
            <option value="days">Days</option>
            <option value="weeksAndDays">Weeks and days</option>
          </select>
        </div>
      </div>

      <div class="row mb-4 align-items-center col-md-8">
        <div class="col-4 text-end"><label class="form-label mb-0">Font size</label></div>
        <div class="col-8">
          <select id="fontSizeSelector" class="form-select" onchange="changeFontSize(this.value)">
            <option value="normal">Normal</option>
            <option value="large">Large</option>
            <option value="xlarge">Extra large</option>
            <option value="jumbo">Jumbo</option>
          </select>
        </div>
      </div>

      <div class="row mb-3 align-items-center col-md-8">
        <div class="col-4 text-end"><label class="form-label mb-0">Max countdowns</label></div>
        <div class="col-8">
          <select id="maxCountdownsSelector" class="form-select" onchange="changeMaxCountdowns(this.value)">
            <option value="5">5</option>
            <option value="10">10</option>
            <option value="20">20</option>
            <option value="0">All</option>
          </select>
        </div>
      </div>

      <div class="row mb-4 align-items-center col-md-8">
        <div class="col-4 text-end"><label class="form-label mb-0">Auto-hide menu</label></div>
        <div class="col-8">
          <div class="form-check form-switch mt-1">
            <input id="autoHideMenu" class="form-check-input" type="checkbox" onchange="changeAutoHideMenu(this.checked)">
          </div>
        </div>
      </div>

      <button class="btn btn-primary" onclick="closeSettings()">Done</button>

      <div class="mt-4 row align-items-center col-md-8">
        <div class="col-4 text-end"></div>
        <div class="col-8">
          <a href="https://buymeacoffee.com/ownimage" target="_blank" rel="noopener">
            <img src="https://cdn.buymeacoffee.com/buttons/v2/default-yellow.png" alt="Buy Me A Coffee" style="height:50px;">
          </a>
        </div>
      </div>

      <div class="mt-5 small build-number">Build <span id="buildNumber"></span></div>
    </div>
    <script>document.getElementById("buildNumber").textContent = BUILD_NUMBER;</script>

  </div>

  <!-- QR EXPORT MODAL -->
  <div id="qrExportModal" class="qr-modal d-none">
    <div class="qr-modal-content">
      <h3>Exported QR Codes</h3>
      <p class="text-secondary">Scan all QR codes to restore your data.</p>

      <div id="qrList" class="qr-scroll"></div>

      <button class="btn btn-secondary mt-3" onclick="closeQRExportModal()">Close</button>
    </div>
  </div>

  <!-- QR IMPORT MODAL -->
  <div id="qrImportModal" class="qr-modal d-none">
    <div class="qr-modal-content">
      <h3>Import via QR</h3>
      <p id="qrImportStatus" class="text-info">Waiting for QR scans…</p>

      <div id="qrReader" style="width: 100%; height: 320px;"></div>

      <button class="btn btn-danger mt-3" onclick="cancelQRImport()">Cancel</button>
    </div>
  </div>

  <!-- BOOTSTRAP JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- FLATPICKR -->
  <script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.js"></script>

  <!-- REQUIRED LIBRARIES FOR QR -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.6"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>


  <script>
  document.write('<script src="js/sampleImages.js?v=' + BUILD_NUMBER + '"><\/script>');
  document.write('<script src="js/sampleCategories.js?v=' + BUILD_NUMBER + '"><\/script>');
  document.write('<script src="js/sampleDates.js?v=' + BUILD_NUMBER + '"><\/script>');
  document.write('<script src="js/settings.js?v=' + BUILD_NUMBER + '"><\/script>');
  document.write('<script src="js/app.js?v=' + BUILD_NUMBER + '"><\/script>');
  document.write('<script src="js/dates.js?v=' + BUILD_NUMBER + '"><\/script>');
  document.write('<script src="js/categories.js?v=' + BUILD_NUMBER + '"><\/script>');
  document.write('<script src="js/images.js?v=' + BUILD_NUMBER + '"><\/script>');
  </script>

</body>
</html>
