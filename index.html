<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Count My Days</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
    }

    /* Top Menu */
    .menu {
      background: #333;
      color: white;
      padding: 12px 20px;
      display: flex;
      gap: 20px;
      font-size: 1.1rem;
    }

    .menu-item {
      cursor: pointer;
      user-select: none;
    }

    .menu-item:hover {
      text-decoration: underline;
    }

    /* Countdown Boxes */
    .container {
      text-align: center;
      padding: 40px;
    }

    .count-box {
      background: white;
      padding: 20px;
      margin: 15px auto;
      border-radius: 12px;
      width: 300px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .count-title {
      font-size: 1.4rem;
      margin-bottom: 10px;
    }

    .count-number {
      font-size: 2.4rem;
      font-weight: bold;
      color: #c0392b;
    }

    /* Editor */
    .editor-item {
      background: white;
      padding: 10px;
      margin: 10px auto;
      border-radius: 8px;
      width: 320px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .editor-name {
      font-size: 1.1rem;
    }

    .delete-btn {
      background: #c0392b;
      color: white;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- Top Menu -->
  <div class="menu">
    <div class="menu-item" onclick="menuAction('edit')">Edit</div>
    <div class="menu-item" onclick="menuAction('export')">Export</div>
    <div class="menu-item" onclick="menuAction('import')">Import</div>
    <div class="menu-item" onclick="menuAction('settings')">Settings</div>
  </div>

  <!-- Countdown View -->
  <div class="container" id="countdownContainer"></div>

  <!-- Editor View -->
  <div class="container" id="editorContainer" style="display:none;">
    <h2>Edit Dates</h2>

    <div id="editorList"></div>

    <h3>Add New Date</h3>
    <input id="newName" type="text" placeholder="Name">
    <input id="newDate" type="date">
    <button onclick="addDate()">Add</button>

    <br><br>
    <button onclick="closeEditor()">Done</button>
  </div>

  <script>
    // Default dates if none exist
    const defaultDates = [
      { name: "Christmas", date: "2026-12-25" },
      { name: "Birthday", date: "2026-08-14" }
    ];

    function initStorage() {
      if (!localStorage.getItem("countdownDates")) {
        localStorage.setItem("countdownDates", JSON.stringify(defaultDates));
      }
    }

    function loadDates() {
      return JSON.parse(localStorage.getItem("countdownDates")) || [];
    }

    function saveDates(dates) {
      localStorage.setItem("countdownDates", JSON.stringify(dates));
    }

    function daysUntil(dateString) {
      const today = new Date();
      const target = new Date(dateString);

      if (target < today) {
        target.setFullYear(today.getFullYear() + 1);
      }

      const diff = target - today;
      return Math.ceil(diff / (1000 * 60 * 60 * 24));
    }

    // -------------------------
    // COUNTDOWN VIEW (SORTED)
    // -------------------------
    function renderCountdowns() {
      const container = document.getElementById("countdownContainer");
      const editor = document.getElementById("editorContainer");

      container.style.display = "block";
      editor.style.display = "none";

      container.innerHTML = "";

      let dates = loadDates();

      // Add daysRemaining to each item
      dates = dates.map(item => ({
        ...item,
        daysRemaining: daysUntil(item.date)
      }));

      // Sort by fewest days remaining
      dates.sort((a, b) => a.daysRemaining - b.daysRemaining);

      // Render sorted list
      dates.forEach(item => {
        const box = document.createElement("div");
        box.className = "count-box";

        box.innerHTML = `
          <div class="count-title">${item.name}</div>
          <div class="count-number">${item.daysRemaining}</div>
        `;

        container.appendChild(box);
      });
    }

    // -------------------------
    // EDITOR VIEW
    // -------------------------
    function openEditor() {
      const container = document.getElementById("countdownContainer");
      const editor = document.getElementById("editorContainer");
      const list = document.getElementById("editorList");

      container.style.display = "none";
      editor.style.display = "block";

      list.innerHTML = "";

      const dates = loadDates();

      dates.forEach((item, index) => {
        const row = document.createElement("div");
        row.className = "editor-item";

        row.innerHTML = `
          <div class="editor-name">${item.name} — ${item.date}</div>
          <button class="delete-btn" onclick="deleteDate(${index})">Delete</button>
        `;

        list.appendChild(row);
      });
    }

    function closeEditor() {
      renderCountdowns();
    }

    // -------------------------
    // ADD / DELETE
    // -------------------------
    function addDate() {
      const name = document.getElementById("newName").value.trim();
      const date = document.getElementById("newDate").value;

      if (!name || !date) {
        alert("Please enter both a name and a date");
        return;
      }

      const dates = loadDates();
      dates.push({ name, date });
      saveDates(dates);

      document.getElementById("newName").value = "";
      document.getElementById("newDate").value = "";

      openEditor();
    }

    function deleteDate(index) {
      const dates = loadDates();
      dates.splice(index, 1);
      saveDates(dates);
      openEditor();
    }

    // -------------------------
    // MENU ACTIONS
    // -------------------------
    function menuAction(action) {
      if (action === "edit") {
        openEditor();
        return;
      }

      alert("You clicked: " + action);
    }

    // Init
    initStorage();
    renderCountdowns();
  </script>

</body>
</html>
